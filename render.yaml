services:
  - type: web
    name: ai-stock-platform
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FINMIND_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
