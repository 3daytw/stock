<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 概念股分析平台</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:  #0d1117; --bg2: #161b22; --bg3: #21262d;
  --bd:  #30363d; --tx:  #e6edf3; --tx2: #8b949e;
  --grn: #3fb950; --red: #f85149; --blu: #58a6ff;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  display:flex; flex-direction:column; height:100dvh;
  background:var(--bg); color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px; overflow:hidden;
}

/* ── Header ── */
#hdr {
  height:46px; background:var(--bg2); border-bottom:1px solid var(--bd);
  display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0;
  z-index:10;
}
#hdr h1 { font-size:15px; font-weight:700; color:var(--blu); white-space:nowrap; }
#hdr .sub { font-size:11px; color:var(--tx2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── 3-panel body ── */
#body { display:flex; flex:1; overflow:hidden; min-height:0; }

/* ── Sidebar ── */
#sb {
  width:220px; background:var(--bg2); border-right:1px solid var(--bd);
  display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
}
#sb-top { padding:10px; border-bottom:1px solid var(--bd); display:flex; flex-direction:column; gap:6px; }
#search {
  background:var(--bg3); border:1px solid var(--bd); border-radius:6px;
  padding:7px 10px; color:var(--tx); font-size:13px; outline:none; width:100%;
}
#search:focus { border-color:var(--blu); }
#cats { display:flex; flex-wrap:wrap; gap:3px; }
.cb {
  padding:2px 7px; border-radius:10px; font-size:10px; cursor:pointer;
  border:1px solid var(--bd); background:transparent; color:var(--tx2); transition:all .15s;
}
.cb:hover,.cb.on { background:var(--blu); color:#fff; border-color:var(--blu); }
#slist { flex:1; overflow-y:auto; }
#slist::-webkit-scrollbar { width:3px; }
#slist::-webkit-scrollbar-thumb { background:var(--bd); border-radius:2px; }
.si {
  padding:8px 12px; cursor:pointer; border-left:3px solid transparent; transition:background .12s;
}
.si:hover { background:var(--bg3); }
.si.on { background:var(--bg3); border-left-color:var(--blu); }
.si-row { display:flex; justify-content:space-between; align-items:center; }
.si-name { font-weight:600; font-size:13px; }
.si-id { font-size:10px; color:var(--tx2); }
.si-p { font-size:13px; font-weight:600; }
.si-c { font-size:10px; }
.up { color:var(--grn); } .dn { color:var(--red); }

/* ── Main ── */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* info bar */
#ibar {
  height:52px; background:var(--bg2); border-bottom:1px solid var(--bd);
  display:flex; align-items:center; padding:0 14px; gap:16px; flex-shrink:0; overflow-x:auto;
}
#ibar::-webkit-scrollbar { display:none; }
#ibar-hint { color:var(--tx2); font-size:13px; white-space:nowrap; }
#ibar-data { display:none; align-items:center; gap:16px; white-space:nowrap; }
#ibar-sname { font-size:16px; font-weight:700; }
#ibar-sid { font-size:11px; color:var(--tx2); }
#ibar-price { font-size:20px; font-weight:700; }
.iv { display:flex; flex-direction:column; gap:1px; }
.il { font-size:9px; color:var(--tx2); text-transform:uppercase; letter-spacing:.4px; }
.iv-v { font-size:12px; font-weight:600; }

/* chart section */
#csec { flex:1; display:flex; flex-direction:column; padding:10px; gap:6px; overflow:hidden; min-height:0; }

/* Range buttons with % badge */
#rbar { display:flex; gap:4px; align-items:flex-end; overflow-x:auto; padding-bottom:2px; }
#rbar::-webkit-scrollbar { display:none; }
.rb {
  display:flex; flex-direction:column; align-items:center; gap:1px;
  padding:4px 8px; border-radius:5px; cursor:pointer; flex-shrink:0;
  border:1px solid var(--bd); background:transparent; color:var(--tx2);
  min-width:48px; transition:all .15s;
}
.rb:hover { border-color:var(--tx2); }
.rb.on { background:var(--blu); color:#fff; border-color:var(--blu); }
.rb.on .rp { color:rgba(255,255,255,.85); }
.rb-lbl { font-size:12px; font-weight:600; line-height:1; }
.rp { font-size:10px; line-height:1; color:var(--tx2); white-space:nowrap; }

#cbox {
  flex:1; background:var(--bg2); border-radius:8px; border:1px solid var(--bd);
  overflow:hidden; position:relative; min-height:0;
}
#cbox-hint {
  position:absolute; inset:0; display:flex; align-items:center;
  justify-content:center; color:var(--tx2); font-size:13px; pointer-events:none;
}

/* ── AI Panel ── */
#ai {
  width:300px; background:var(--bg2); border-left:1px solid var(--bd);
  display:flex; flex-direction:column; flex-shrink:0;
}
#ai-hdr {
  padding:10px 14px; border-bottom:1px solid var(--bd);
  display:flex; align-items:center; gap:7px; flex-shrink:0;
}
#ai-hdr h3 { font-size:13px; font-weight:600; }
.badge { background:var(--blu); color:#fff; font-size:10px; padding:1px 6px; border-radius:8px; }
#msgs { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px; min-height:0; }
#msgs::-webkit-scrollbar { width:3px; }
#msgs::-webkit-scrollbar-thumb { background:var(--bd); border-radius:2px; }
.msg { display:flex; flex-direction:column; gap:3px; }
.msg.u { align-items:flex-end; }
.msg.a { align-items:flex-start; }
.bbl {
  max-width:90%; padding:8px 11px; border-radius:12px;
  font-size:12px; line-height:1.55; word-break:break-word;
}
.msg.u .bbl { background:var(--blu); color:#fff; border-bottom-right-radius:3px; }
.msg.a .bbl { background:var(--bg3); border:1px solid var(--bd); border-bottom-left-radius:3px; }
.mt { font-size:10px; color:var(--tx2); }
#qs { padding:6px 10px; border-top:1px solid var(--bd); display:flex; flex-wrap:wrap; gap:4px; }
.qb {
  padding:3px 8px; background:var(--bg3); border:1px solid var(--bd);
  border-radius:10px; font-size:11px; color:var(--tx2); cursor:pointer; transition:all .15s;
}
.qb:hover { border-color:var(--blu); color:var(--blu); }
#cinp-wrap { padding:10px; border-top:1px solid var(--bd); display:flex; gap:6px; flex-shrink:0; }
#cinp {
  flex:1; background:var(--bg3); border:1px solid var(--bd); border-radius:7px;
  padding:7px 11px; color:var(--tx); font-size:13px; outline:none;
}
#cinp:focus { border-color:var(--blu); }
#sbtn {
  padding:0 13px; background:var(--blu); border:none; border-radius:7px;
  color:#fff; cursor:pointer; font-size:13px; transition:opacity .15s;
}
#sbtn:hover { opacity:.85; }
#sbtn:disabled { opacity:.45; cursor:not-allowed; }
.dots { display:flex; gap:4px; padding:4px 0; align-items:center; }
.dot { width:6px; height:6px; background:var(--tx2); border-radius:50%; animation:pulse 1.4s infinite ease-in-out; }
.dot:nth-child(1){animation-delay:-.32s} .dot:nth-child(2){animation-delay:-.16s}
@keyframes pulse{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── Mobile bottom nav ── */
#mob-nav {
  display:none; position:relative; z-index:20;
  height:56px; background:var(--bg2); border-top:1px solid var(--bd);
  flex-shrink:0;
}
.mob-tab {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; background:transparent; border:none; color:var(--tx2);
  cursor:pointer; font-size:10px; transition:color .15s; padding:0;
}
.mob-tab svg { width:20px; height:20px; }
.mob-tab.on { color:var(--blu); }
.mob-tab.on svg { stroke:var(--blu); }

/* ── Mobile responsive ── */
/* ── Financial Panel ── */
#fund {
  display:none; flex-direction:column; background:var(--bg2);
  border:1px solid var(--bd); border-radius:8px; flex-shrink:0;
  height:300px; overflow:hidden;
}
#fund.show { display:flex; }
#fund-tabs {
  display:flex; border-bottom:2px solid var(--bd); flex-shrink:0;
  padding:0 10px; background:var(--bg3); border-radius:8px 8px 0 0;
  gap:2px; align-items:center;
}
.ft {
  padding:10px 16px; font-size:13px; font-weight:600; color:var(--tx2); cursor:pointer;
  border:none; background:none; border-bottom:3px solid transparent; margin-bottom:-2px;
  transition:all .15s; white-space:nowrap;
}
.ft:hover { color:var(--tx); }
.ft.on { color:var(--blu); border-bottom-color:var(--blu); }
#fund-body {
  flex:1; overflow-x:auto; overflow-y:hidden; padding:10px 14px; min-height:0;
}
#fund-body::-webkit-scrollbar { height:4px; }
#fund-body::-webkit-scrollbar-thumb { background:var(--bd); border-radius:2px; }
.find { display:flex; gap:8px; height:100%; min-width:max-content; align-items:flex-end; }
.bc { display:flex; flex-direction:column; align-items:center; gap:3px; width:50px; }
.bv { font-size:10px; color:var(--tx); text-align:center; white-space:nowrap; width:100%; overflow:hidden; }
.by { font-size:10px; text-align:center; white-space:nowrap; line-height:1.2; }
.bw { height:110px; display:flex; align-items:flex-end; width:100%; border-bottom:1px solid rgba(255,255,255,.2); }
.br { width:100%; border-radius:3px 3px 0 0; }
.br.pos { background:#3fb95099; } .br.neg { background:#f8514999; }
.bl { font-size:10px; color:var(--tx2); text-align:center; white-space:nowrap; width:100%; overflow:hidden; }
.bsub { font-size:11px; color:var(--tx2); white-space:nowrap; margin-top:6px; align-self:flex-start; }
/* Valuation zone */
.vz { display:flex; flex-direction:column; gap:4px; width:100%; padding:2px 0; }
/* Zone price/PE labels — positioned at ACTUAL % on track (not evenly spaced) */
.vzrow  { position:relative; height:26px; }
.vzperow{ position:relative; height:14px; margin-top:2px; }
.vzlbl  { position:absolute; font-size:9px; font-weight:700; text-align:center; white-space:nowrap; line-height:1.4; }
.vzpe   { position:absolute; font-size:8px; color:var(--tx2); white-space:nowrap; transform:translateX(-50%); }
.vmeta { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
.vm { display:flex; flex-direction:column; }
.vml { font-size:8px; color:var(--tx2); }
.vmv { font-size:13px; font-weight:700; line-height:1.3; }
.nd { display:flex; align-items:center; justify-content:center; height:100%; color:var(--tx2); font-size:12px; }
/* Price-pin track */
.vtk-wrap { position:relative; padding-top:38px; overflow:visible; }
.vtk-pin {
  position:absolute; top:0; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; pointer-events:none; z-index:5;
}
.vtk-lbl {
  font-size:11px; font-weight:800; padding:2px 8px; border-radius:4px;
  white-space:nowrap; line-height:1.5; background:rgba(25,25,25,.92);
  border:1px solid rgba(255,255,255,.2);
}
.vtk-stem { width:2px; height:20px; background:rgba(255,255,255,.75); margin-top:2px; }
.vtrack { height:12px; border-radius:6px; position:relative; overflow:hidden; }
.vtrack-tick { position:absolute; top:0; bottom:0; width:1px; background:rgba(255,255,255,.45); }
.vtk-dot {
  position:absolute; top:42px; width:10px; height:10px; background:white;
  border-radius:50%; transform:translateX(-50%); z-index:4;
  box-shadow:0 0 8px rgba(255,255,255,.8), 0 0 3px rgba(255,255,255,1);
}
/* Drag divider between chart and fund panel */
#fund-drag {
  height:7px; flex-shrink:0; cursor:row-resize;
  display:none; align-items:center; justify-content:center;
  background:transparent; border-top:1px solid var(--bd); transition:background .15s;
}
#fund-drag.show { display:flex; }
#fund-drag:hover, #fund-drag.dragging { background:rgba(88,166,255,.2); border-color:var(--blu); }
#fund-drag::after {
  content:''; width:32px; height:3px; border-radius:2px;
  background:var(--bd); transition:background .15s;
}
#fund-drag:hover::after, #fund-drag.dragging::after { background:var(--blu); }
/* Recommendation button */
.cb-rec  { background:rgba(88,166,255,.12) !important; border-color:var(--blu) !important; color:var(--blu) !important; }
.cb-rec.on { background:var(--blu) !important; color:#fff !important; }
/* Fund panel expand */
#fund.expanded { height:520px; }
#fund-exp { margin-left:auto; font-size:11px; font-weight:600; padding:5px 10px; opacity:.6; color:var(--tx2); border-radius:4px; }
#fund-exp:hover { opacity:1; color:var(--blu); background:rgba(88,166,255,.1); }
/* Zone badge in ibar */
#ibar-zone { display:none; }
.zone-tag {
  font-size:11px; font-weight:800; padding:2px 9px; border-radius:4px;
  white-space:nowrap; line-height:1.6; background:rgba(20,20,20,.85);
  border:1px solid currentColor;
}

@media (max-width: 767px) {
  #fund { height:260px; }
}

@media (max-width: 767px) {
  #mob-nav { display:flex; }
  #body { position:relative; }

  #sb {
    position:absolute; inset:0; z-index:15;
    width:100%; display:none;
  }
  #ai {
    position:absolute; inset:0; z-index:15;
    width:100%; display:none;
  }
  #main { width:100%; display:flex; }

  #sb.mob-show, #ai.mob-show { display:flex; }

  #hdr .sub { display:none; }
  #ibar { gap:12px; }
  #ibar-sname { font-size:14px; }
  #ibar-price { font-size:17px; }

  .rb { min-width:44px; padding:4px 6px; }
  .rb-lbl { font-size:11px; }
  .rp { font-size:9px; }
}
</style>
</head>
<body>

<div id="hdr">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2.2">
    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
    <polyline points="16 7 22 7 22 13"/>
  </svg>
  <h1>AI 概念股分析平台</h1>
  <span class="sub">Taiwan AI Stock Analytics · Claude</span>
</div>

<div id="body">

  <!-- Sidebar -->
  <div id="sb">
    <div id="sb-top">
      <input id="search" type="text" placeholder="搜尋股票名稱或代號…" autocomplete="off">
      <div id="cats"></div>
    </div>
    <div id="slist"><div style="padding:20px;text-align:center;color:var(--tx2)">載入中…</div></div>
  </div>

  <!-- Main chart area -->
  <div id="main">
    <div id="ibar">
      <div id="ibar-hint">← 請選擇股票</div>
      <div id="ibar-data">
        <div>
          <div id="ibar-sname">-</div>
          <div id="ibar-sid">-</div>
        </div>
        <div id="ibar-price">-</div>
        <div id="ibar-zone"><span id="ibar-zone-tag" class="zone-tag">—</span></div>
        <div class="iv"><div class="il">漲跌</div><div class="iv-v" id="iv-chg">-</div></div>
        <div class="iv"><div class="il">漲跌幅</div><div class="iv-v" id="iv-pct">-</div></div>
        <div class="iv"><div class="il">最高</div><div class="iv-v" id="iv-hi">-</div></div>
        <div class="iv"><div class="il">最低</div><div class="iv-v" id="iv-lo">-</div></div>
        <div class="iv"><div class="il">成交量</div><div class="iv-v" id="iv-vol">-</div></div>
        <div class="iv"><div class="il">日期</div><div class="iv-v" id="iv-date">-</div></div>
      </div>
    </div>
    <div id="csec">
      <div id="rbar">
        <button class="rb" data-mode="day" data-d="1" onclick="switchRange(this)">
          <span class="rb-lbl">1D</span><span class="rp" id="rp-1d">—</span>
        </button>
        <button class="rb" data-mode="day" data-d="5" onclick="switchRange(this)">
          <span class="rb-lbl">5D</span><span class="rp" id="rp-5d">—</span>
        </button>
        <button class="rb" data-mode="day" data-d="30" onclick="switchRange(this)">
          <span class="rb-lbl">1M</span><span class="rp" id="rp-30">—</span>
        </button>
        <button class="rb on" data-mode="day" data-d="180" onclick="switchRange(this)">
          <span class="rb-lbl">6M</span><span class="rp" id="rp-180">—</span>
        </button>
        <button class="rb" data-mode="day" data-d="365" onclick="switchRange(this)">
          <span class="rb-lbl">1Y</span><span class="rp" id="rp-365">—</span>
        </button>
        <button class="rb" data-mode="day" data-d="730" onclick="switchRange(this)">
          <span class="rb-lbl">2Y</span><span class="rp" id="rp-730">—</span>
        </button>
      </div>
      <div id="cbox">
        <div id="cbox-hint">請選擇左側股票以顯示 K 線圖</div>
      </div>
      <div id="fund-drag"></div>
      <div id="fund">
        <div id="fund-tabs">
          <button class="ft on" data-tab="rev" onclick="showFund('rev')">月營收</button>
          <button class="ft" data-tab="eps" onclick="showFund('eps')">EPS 季報</button>
          <button class="ft" data-tab="val" onclick="showFund('val')">估值分析</button>
          <button class="ft" id="fund-exp" onclick="toggleFund()">展開 ↕</button>
        </div>
        <div id="fund-body"><div class="nd">載入中…</div></div>
      </div>
    </div>
  </div>

  <!-- AI panel -->
  <div id="ai">
    <div id="ai-hdr">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
      </svg>
      <h3>AI 股票分析師</h3>
      <span class="badge">Claude</span>
    </div>
    <div id="msgs">
      <div class="msg a">
        <div class="bbl">
          你好！我是 AI 股票分析師，專精台灣 AI 概念股。<br><br>
          可以問我：<br>
          · 某股票近期走勢分析<br>
          · AI 概念股比較與選股<br>
          · 產業趨勢與市場動態
        </div>
        <div class="mt">AI 分析師</div>
      </div>
    </div>
    <div id="qs">
      <button class="qb" onclick="quick('這支股票近期走勢如何？')">近期走勢</button>
      <button class="qb" onclick="quick('這支股票的投資亮點？')">投資亮點</button>
      <button class="qb" onclick="quick('AI概念股哪支最有潛力？')">最有潛力</button>
      <button class="qb" onclick="quick('台積電近期表現如何？')">台積電</button>
    </div>
    <div id="cinp-wrap">
      <input id="cinp" type="text" placeholder="輸入問題… (Enter 送出)"
             onkeydown="if(event.key==='Enter')send()">
      <button id="sbtn" onclick="send()">送出</button>
    </div>
  </div>
</div>

<!-- Mobile bottom nav -->
<nav id="mob-nav">
  <button class="mob-tab" data-tab="sb" onclick="showTab('sb')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    選股
  </button>
  <button class="mob-tab on" data-tab="main" onclick="showTab('main')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    圖表
  </button>
  <button class="mob-tab" data-tab="ai" onclick="showTab('ai')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4M12 8h.01"/>
    </svg>
    AI
  </button>
</nav>

<script>
const API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://localhost:8000/api'
  : '/api';

let sel = null;
let chart = null;
let fullData = [];
let allStocks = [];
let lctr = 0;
let activeRangeBtn = null;

const DEFAULT_IDS = ['2330','2308','2382','2317','1802','0050','00631L','3189','6664'];
let priceCache = {};    // id → {close, chg, pct}
let priceLoaded = new Set();
let stockFundCache = {}; // id → {rev, fin, per}

// ── Init ─────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}/stocks`);
    allStocks = await r.json();
    renderCats();
    applyFilter();
  } catch {

  }
}

function renderCats() {

function renderList(stocks) {
  document.getElementById('slist').innerHTML = stocks.map(s => `
    <div class="si${sel?.id===s.id?' on':''}" id="si-${s.id}" onclick="pickStock('${s.id}','${s.name}')">

async function loadPrices(stocks) {
  const end = fmtDate(new Date());
  const start = fmtDate(new Date(Date.now() - 10 * 864e5));
  const toLoad = stocks.filter(s => !priceLoaded.has(s.id));
  const BATCH = 5;
  for (let i = 0; i < toLoad.length; i += BATCH) {
    await Promise.all(toLoad.slice(i, i + BATCH).map(async s => {
      priceLoaded.add(s.id);
      try {
        const r = await fetch(`${API}/stock/${s.id}/price?start_date=${start}&end_date=${end}`);
        const data = await r.json();
        if (data?.length) {
          const lat = data[data.length - 1];
          const prev = data.length > 1 ? data[data.length - 2] : null;
          const chg = prev ? +lat.close - +prev.close : 0;
          const pct = prev ? chg / +prev.close * 100 : 0;
          priceCache[s.id] = { close: +lat.close, chg, pct };
          const pe = document.getElementById(`sp-${s.id}`);
          const ce = document.getElementById(`sc-${s.id}`);
          if (pe) { pe.textContent = (+lat.close).toFixed(1); pe.className = `si-p ${chg>=0?'up':'dn'}`; }
          if (ce) { ce.textContent = `${chg>=0?'+':''}${pct.toFixed(2)}%`; ce.className = `si-c ${chg>=0?'up':'dn'}`; }
        }
      } catch {}
    }));
    if (i + BATCH < toLoad.length) await sleep(200);
  }
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter();
}

document.getElementById('search').addEventListener('input', applyFilter);

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.querySelector('.cb.on')?.textContent?.trim() || '精選';

  if (cat.includes('推薦') && !q) { filterRecommended(); return; }

  let stocks;
  if (q) {
    stocks = allStocks.filter(s => s.name.includes(q) || s.id.includes(q) || s.category.includes(q));
  } else if (cat === '精選') {
    stocks = allStocks.filter(s => DEFAULT_IDS.includes(s.id));
  } else if (cat === '全部' || cat.includes('推薦')) {
    stocks = allStocks;
  } else {
    stocks = allStocks.filter(s => s.category === cat);
  }
  renderList(stocks);
  loadPrices(stocks);
}

async function filterRecommended() {
  const slist = document.getElementById('slist');
  const nonETF = allStocks.filter(s => !s.category.startsWith('ETF'));
  const end = fmtDate(new Date()), ps = fmtDate(new Date(Date.now() - 10 * 864e5));
  const passed = []; let done = 0;

  const upd = () => {
    slist.innerHTML = `<div style="padding:16px 12px;color:var(--tx2);font-size:12px">
      ⭐ 評估中… ${done}/${nonETF.length}<br>
      <div style="margin-top:4px;height:3px;background:var(--bg3);border-radius:2px">
        <div style="width:${Math.round(done/nonETF.length*100)}%;height:100%;background:var(--blu);border-radius:2px;transition:width .3s"></div>
      </div>
      <div style="margin-top:6px;color:var(--grn)">已找到 ${passed.length} 支 ✓</div>
    </div>`;
  };
  upd();

  const BATCH = 4;
  for (let i = 0; i < nonETF.length; i += BATCH) {
    await Promise.all(nonETF.slice(i, i + BATCH).map(async s => {
      try {
        if (!priceLoaded.has(s.id)) {
          priceLoaded.add(s.id);
          const pr = await fetch(`${API}/stock/${s.id}/price?start_date=${ps}&end_date=${end}`);
          const pd = await pr.json();
          if (pd?.length) {
            const lat = pd[pd.length-1], prev = pd.length>1 ? pd[pd.length-2] : null;
            const chg = prev ? +lat.close - +prev.close : 0;
            priceCache[s.id] = { close: +lat.close, chg, pct: prev ? chg/+prev.close*100 : 0 };
          }
        }
        if (!stockFundCache[s.id]) {
          const [rev, fin, per] = await Promise.all([
            fetch(`${API}/stock/${s.id}/revenue`).then(r=>r.json()).catch(()=>[]),
            fetch(`${API}/stock/${s.id}/financials`).then(r=>r.json()).catch(()=>[]),
            fetch(`${API}/stock/${s.id}/per`).then(r=>r.json()).catch(()=>[]),
          ]);
          stockFundCache[s.id] = { rev, fin, per };
        }
        const { rev, fin, per } = stockFundCache[s.id];
        const price = priceCache[s.id]?.close;
        // Criterion 1: latest revenue YoY > 0
        let goodRev = false;
        if (rev?.length) {
          const sorted = [...rev].sort((a,b)=>a.date.localeCompare(b.date));
          const lat = sorted[sorted.length-1];
          const latD = new Date(lat.date);
          const prev = sorted.find(r => { const d=new Date(r.date); return d.getFullYear()===latD.getFullYear()-1&&d.getMonth()===latD.getMonth(); });
          if (prev) goodRev = +lat.revenue > +prev.revenue;
        }
        // Criterion 2: price ≤ 便宜價 (P/E 30th percentile × TTM EPS)
        let cheap = false;
        if (fin?.length && per?.length && price) {
          const eps = fin.filter(r=>r.type==='EPS').sort((a,b)=>a.date.localeCompare(b.date));
          if (eps.length >= 4) {
            const ttm = eps.slice(-4).reduce((s,r)=>s + +r.value, 0);
            const pers = per.filter(r=>+r.PER>0&&+r.PER<300).map(r=>+r.PER).sort((a,b)=>a-b);
            if (pers.length) {
              const pe30 = pers[Math.floor(0.30*pers.length)];
              cheap = price <= pe30 * ttm;
            }
          }
        }
        if (goodRev && cheap) passed.push(s);
      } catch {}
      done++;
      upd();
    }));
    if (i + BATCH < nonETF.length) await sleep(250);
  }

  if (!passed.length) {
    slist.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tx2);font-size:12px">目前無符合條件的推薦股票</div>';
  } else {
    renderList(passed);
  }
}

// ── Range % badges ────────────────────────────────
function updateAllRangePcts() {
  if (!fullData?.length) return;
  const latest = +fullData[fullData.length - 1].close;

  // Daily ranges
  [[30,'rp-30'],[180,'rp-180'],[365,'rp-365'],[730,'rp-730']].forEach(([d, id]) => {
    const slice = fullData.slice(-d);
    if (!slice.length) return;
    setPct(id, latest, +slice[0].close);
  });

  // 1D: today vs yesterday
  if (fullData.length >= 2) setPct('rp-1d', latest, +fullData[fullData.length - 2].close);

  // 5D: last 5 trading days
  if (fullData.length >= 6) setPct('rp-5d', latest, +fullData[fullData.length - 6].close);
}

function setPct(id, latest, first) {
  const pct = (latest - first) / first * 100;
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`;
  el.className = `rp ${pct >= 0 ? 'up' : 'dn'}`;
}

// ── Range switching ───────────────────────────────
function switchRange(btn) {
  document.querySelectorAll('.rb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeRangeBtn = btn;
  if (!sel) return;
  renderRangeFromFull(btn);
}

function renderRangeFromFull(btn) {
  if (!fullData?.length) return;
  const d = parseInt(btn.dataset.d);
  // 1D/5D: show full slice for %, but display at least 10 bars so chart isn't empty
  const displayBars = d <= 5 ? Math.max(d + 1, 10) : d;
  const slice = fullData.slice(-displayBars);
  if (!slice.length) { setChartHint('此區間無資料'); return; }
  setChartHint('');
  drawDailyChart(slice);
  // Info bar: compare based on actual range (1D = today vs yesterday, 5D = today vs 5 days ago)
  const pctRef = fullData.length > d ? fullData[fullData.length - 1 - d] : fullData[0];
  updateIbar(slice[slice.length - 1], pctRef);
}

function renderDailySlice(d) {
  if (!fullData?.length) return;
  drawDailyChart(fullData.slice(-d));
  const lat = fullData[fullData.length - 1];
  const prev = fullData.length > 1 ? fullData[fullData.length - 2] : null;
  updateIbar(lat, prev);
}

async function loadMinuteChart(days) {
  if (!sel) return;
  setChartHint('載入分鐘資料…');
  try {
    const r = await fetch(`${API}/stock/${sel.id}/minutes?days=${days}`);
    const data = await r.json();
    if (!data?.length) { setChartHint('無分鐘資料（可能非交易時間）'); return; }
    setChartHint('');
    drawMinuteChart(data);
    updateIbar(data[data.length - 1], data.length > 1 ? data[data.length - 2] : null, true);
    // Update 1D/5D % from actual minute data
    const pctId = days === 1 ? 'rp-1d' : 'rp-5d';
    setPct(pctId, +data[data.length - 1].close, +data[0].close);
  } catch {
    setChartHint('分鐘資料載入失敗');
  }
}

// ── Chart drawing ─────────────────────────────────
function drawDailyChart(data) {
  const box = document.getElementById('cbox');
  if (chart) { chart.remove(); chart = null; }

  chart = LightweightCharts.createChart(box, chartOpts(box));
  const cs = chart.addCandlestickSeries(candleStyle());
  cs.setData(data.map(d => ({ time: d.date, open: +d.open, high: +d.max, low: +d.min, close: +d.close })));
  addVolume(chart, data.map(d => ({
    time: d.date, value: +d.Trading_Volume,
    color: +d.close >= +d.open ? '#3fb95038' : '#f8514938',
  })));
  chart.timeScale().fitContent();
  watchResize(box);
}

function drawMinuteChart(data) {
  const box = document.getElementById('cbox');
  if (chart) { chart.remove(); chart = null; }

  chart = LightweightCharts.createChart(box, { ...chartOpts(box), timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false } });
  const cs = chart.addCandlestickSeries(candleStyle());
  cs.setData(data.map(d => ({
    time: minToTs(d.date),
    open: +d.open, high: +d.max, low: +d.min, close: +d.close,
  })));
  addVolume(chart, data.map(d => ({
    time: minToTs(d.date), value: +d.volume,
    color: +d.close >= +d.open ? '#3fb95038' : '#f8514938',
  })));
  chart.timeScale().fitContent();
  watchResize(box);
}

function minToTs(s) {
  // "2024-01-15 09:01:00" → UTC timestamp (Taiwan is UTC+8)
  return Math.floor(new Date(s.replace(' ', 'T') + '+08:00').getTime() / 1000);
}

function chartOpts(box) {
  return {
    width: box.clientWidth, height: box.clientHeight,
    layout: { background: { color: '#161b22' }, textColor: '#8b949e' },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: { borderColor: '#30363d' },
  };
}

function candleStyle() {
  return { upColor:'#3fb950', downColor:'#f85149', borderUpColor:'#3fb950', borderDownColor:'#f85149', wickUpColor:'#3fb950', wickDownColor:'#f85149' };
}

function addVolume(c, data) {
  const vs = c.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
  c.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
  vs.setData(data);
}

let resizeObs = null;
function watchResize(box) {
  if (resizeObs) resizeObs.disconnect();
  resizeObs = new ResizeObserver(() => {
    if (chart) chart.applyOptions({ width: box.clientWidth, height: box.clientHeight });
  });
  resizeObs.observe(box);
}

function setChartHint(msg) {
  const el = document.getElementById('cbox-hint');
  el.style.display = msg ? 'flex' : 'none';
  el.textContent = msg;
  if (msg && chart) { chart.remove(); chart = null; }
}

// ── Info bar ──────────────────────────────────────
function updateIbar(lat, prev, isMinute = false) {
  const chg = prev ? +lat.close - +prev.close : 0;
  const pct = prev ? chg / +prev.close * 100 : 0;
  const cls = chg >= 0 ? 'up' : 'dn';
  const sgn = chg >= 0 ? '+' : '';
  document.getElementById('ibar-price').textContent = (+lat.close).toFixed(1);
  document.getElementById('ibar-price').className = cls;
  set('iv-chg', `${sgn}${chg.toFixed(1)}`, cls);
  set('iv-pct', `${sgn}${pct.toFixed(2)}%`, cls);
  const hi = isMinute ? lat.max : lat.max;
  const lo = isMinute ? lat.min : lat.min;
  set('iv-hi', (+hi).toFixed(1));
  set('iv-lo', (+lo).toFixed(1));
  const vol = +(isMinute ? (lat.volume || 0) : (lat.Trading_Volume || 0));
  set('iv-vol', vol > 1e6 ? `${(vol/1e6).toFixed(1)}M` : vol > 1e3 ? `${(vol/1e3).toFixed(0)}K` : String(vol));
  set('iv-date', isMinute ? lat.date.substring(0, 16) : lat.date);
}

function set(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  if (cls) el.className = `iv-v ${cls}`; else el.className = 'iv-v';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function renderRevenue() {

  const curYear = new Date().getFullYear();
  const ytdCur = rows.filter(r => +r.date.slice(0,4) === curYear).reduce((s,r) => s + +r.revenue, 0);
  const ytdPrev = rows.filter(r => +r.date.slice(0,4) === curYear - 1).slice(0, rows.filter(r => +r.date.slice(0,4) === curYear).length).reduce((s,r) => s + +r.revenue, 0);
  const ytdYoy = ytdPrev > 0 ? (ytdCur - ytdPrev) / ytdPrev * 100 : null;
  const ytdStr = ytdCur > 0 ? `累計 ${(ytdCur/1e8).toFixed(0)}億${ytdYoy !== null ? ` YoY ${ytdYoy>=0?'+':''}${ytdYoy.toFixed(1)}%` : ''}` : '';

  const cols = rows.map(r => {
    const rDate = new Date(r.date);
    const prevRow = rows.find(p => {
      const pd = new Date(p.date);
      return pd.getFullYear() === rDate.getFullYear() - 1 && pd.getMonth() === rDate.getMonth();
    });
    const yoy = prevRow ? (+r.revenue - +prevRow.revenue) / +prevRow.revenue * 100 : null;
    const h = Math.max(2, Math.round(+r.revenue / maxRev * 106));
    const revB = (+r.revenue / 1e8).toFixed(1);
    const lbl = r.date.slice(0, 7).replace('-', '/');
    return `<div class="bc">
      <div class="bv">${revB}億</div>
      <div class="by ${yoy === null ? '' : yoy >= 0 ? 'up' : 'dn'}">${yoy !== null ? (yoy>=0?'+':'')+yoy.toFixed(1)+'%' : ''}</div>
      <div class="bw"><div class="br ${yoy === null || yoy >= 0 ? 'pos' : 'neg'}" style="height:${h}px"></div></div>
      <div class="bl">${lbl}</div>
    </div>`;
  });

  document.getElementById('fund-body').innerHTML =
    `<div class="find">${cols.join('')}</div>${ytdStr ? `<div class="bsub">${ytdStr}</div>` : ''}`;
}

function renderEPS() {
  const fin = fundData.fin;
  const eps = fin?.filter(r => r.type === 'EPS').sort((a, b) => a.date.localeCompare(b.date)).slice(-8);
  if (!eps?.length) {
    document.getElementById('fund-body').innerHTML = '<div class="nd">無 EPS 資料（ETF 不適用）</div>';
    return;
  }
  const maxAbs = Math.max(...eps.map(r => Math.abs(+r.value)));

  const cols = eps.map((r, i) => {
    const v = +r.value;
    const prev = eps.find(p => {
      const pd = new Date(p.date), rd = new Date(r.date);
      return pd.getFullYear() === rd.getFullYear() - 1 && Math.abs(pd.getMonth() - rd.getMonth()) <= 1;
    });
    const yoy = prev && +prev.value !== 0 ? (v - +prev.value) / Math.abs(+prev.value) * 100 : null;
    const h = maxAbs > 0 ? Math.max(2, Math.round(Math.abs(v) / maxAbs * 106)) : 2;
    const lbl = r.date.slice(0, 7).replace('-', '/');
    return `<div class="bc">
      <div class="bv">${v.toFixed(2)}</div>
      <div class="by ${yoy === null ? '' : yoy >= 0 ? 'up' : 'dn'}">${yoy !== null ? (yoy>=0?'+':'')+yoy.toFixed(1)+'%' : ''}</div>
      <div class="bw"><div class="br ${v >= 0 ? 'pos' : 'neg'}" style="height:${h}px"></div></div>
      <div class="bl">${lbl}</div>
    </div>`;
  });

  document.getElementById('fund-body').innerHTML = `<div class="find">${cols.join('')}</div>`;
}

function renderValuation() {
  const { fin, per } = fundData;
  if (!fin?.length || !per?.length) {
    document.getElementById('fund-body').innerHTML = '<div class="nd">無估值資料（ETF 不適用）</div>';
    return;
  }
  const epsRows = fin.filter(r => r.type === 'EPS').sort((a, b) => a.date.localeCompare(b.date));
  if (epsRows.length < 2) {
    document.getElementById('fund-body').innerHTML = '<div class="nd">EPS 資料不足</div>';
    return;
  }
  const ttmEPS = epsRows.slice(-4).reduce((s, r) => s + +r.value, 0);

  // Guard: EPS must be positive for P/E valuation to make sense
  if (ttmEPS <= 0) {
    document.getElementById('fund-body').innerHTML =
      `<div class="nd" style="flex-direction:column;gap:6px">
        <span>TTM EPS = ${ttmEPS.toFixed(2)}（虧損中）</span>
        <span style="font-size:11px;color:var(--tx2)">EPS 為負時無法使用本益比估值</span>
      </div>`;
    return;
  }

  // Use 3-year P/E history for more current calibration
  const cut3y = fmtDate(new Date(Date.now() - 365*3*864e5));
  const raw3y = per.filter(r => r.date >= cut3y && +r.PER > 0 && +r.PER < 300);
  const pers = (raw3y.length >= 60 ? raw3y : per.filter(r => +r.PER > 0 && +r.PER < 300))
    .map(r => +r.PER).sort((a, b) => a - b);
  if (!pers.length) {
    document.getElementById('fund-body').innerHTML = '<div class="nd">本益比資料不足</div>';
    return;
  }
  const pctile = p => pers[Math.min(pers.length - 1, Math.floor(p / 100 * pers.length))];
  const [pe15, pe30, pe50, pe80] = [pctile(15), pctile(30), pctile(50), pctile(80)];
  const zones = [pe15 * ttmEPS, pe30 * ttmEPS, pe50 * ttmEPS, pe80 * ttmEPS];

  const curPrice = fullData?.length ? +fullData[fullData.length - 1].close : 0;
  const latPer = per[per.length - 1];
  const curPER = +latPer.PER;
  const divYield = +latPer.dividend_yield;
  const pbr = +latPer.PBR;

  // Zone label — names match the track markers (特價/便宜/合理/偏高/昂貴)
  const [zoneName, zoneColor] =
    curPrice < zones[0] ? ['特價',  '#58a6ff'] :
    curPrice < zones[1] ? ['便宜',  '#3fb950'] :
    curPrice < zones[2] ? ['合理',  '#f0ad4e'] :
    curPrice < zones[3] ? ['偏高',  '#f85149'] :
                          ['昂貴',  '#f85149'];

  // Push zone to info bar
  const zt = document.getElementById('ibar-zone-tag');
  const zw = document.getElementById('ibar-zone');
  if (zt && zw) { zt.textContent = zoneName; zt.style.color = zoneColor; zt.style.borderColor = zoneColor; zw.style.display = 'block'; }

  const pct = zones[3] > zones[0]
    ? Math.min(96, Math.max(4, (curPrice - zones[0]) / (zones[3] - zones[0]) * 100))
    : 50;

  // PEG = current P/E ÷ TTM EPS YoY growth rate
  let pegHtml = '';
  if (epsRows.length >= 8 && curPER > 0) {
    const prevTTM = epsRows.slice(-8, -4).reduce((s, r) => s + +r.value, 0);
    if (prevTTM > 0 && ttmEPS > prevTTM) {
      const growth = (ttmEPS - prevTTM) / prevTTM * 100;
      const peg = curPER / growth;
      const pegCls = peg < 1 ? 'up' : peg < 2 ? '' : 'dn';
      pegHtml = `<div class="vm"><div class="vml">PEG (EPS+${growth.toFixed(0)}%)</div><div class="vmv ${pegCls}">${peg.toFixed(2)}</div></div>`;
    }
  }

  // P/S via quarterly Revenue & IncomeAfterTaxes
  let psHtml = '';
  const revR = fin.filter(r => r.type === 'Revenue').sort((a,b) => a.date.localeCompare(b.date)).slice(-4);
  const niR  = fin.filter(r => r.type === 'IncomeAfterTaxes').sort((a,b) => a.date.localeCompare(b.date)).slice(-4);
  if (revR.length >= 4 && niR.length >= 4 && ttmEPS !== 0) {
    const ttmRev = revR.reduce((s, r) => s + +r.value, 0);
    const ttmNI  = niR.reduce((s, r) => s + +r.value, 0);
    if (ttmNI !== 0 && ttmRev !== 0) {
      const rps = ttmRev * ttmEPS / ttmNI;
      if (rps > 0) psHtml = `<div class="vm"><div class="vml">P/S 股價/營收</div><div class="vmv">${(curPrice/rps).toFixed(2)}x</div></div>`;
    }
  }

  const f = v => v >= 1000 ? v.toFixed(0) : v.toFixed(1);

  // Zone boundary positions as % of track (so labels align with actual thresholds)
  const span = zones[3] - zones[0];
  const p1 = (span > 0 ? (zones[1]-zones[0])/span*100 : 33).toFixed(1);
  const p2 = (span > 0 ? (zones[2]-zones[0])/span*100 : 66).toFixed(1);
  const grad = `linear-gradient(to right,#58a6ff99 0%,#3fb95099 ${p1}%,#f0ad4e99 ${p2}%,#f8514999 100%)`;

  document.getElementById('fund-body').innerHTML = `
    <div class="vz">
      <div class="vzrow">
        <span class="vzlbl" style="left:0%;color:#58a6ff;text-align:left">特價<br>${f(zones[0])}</span>
        <span class="vzlbl" style="left:${p1}%;transform:translateX(-50%);color:#3fb950">便宜<br>${f(zones[1])}</span>
        <span class="vzlbl" style="left:${p2}%;transform:translateX(-50%);color:#f0ad4e">合理<br>${f(zones[2])}</span>
        <span class="vzlbl" style="right:0%;color:#f85149;text-align:right">昂貴<br>${f(zones[3])}</span>
      </div>
      <div class="vtk-wrap">
        <div class="vtk-pin" style="left:${pct.toFixed(1)}%">
          <span class="vtk-lbl" style="color:${zoneColor}">${curPrice.toFixed(1)}&nbsp;<em style="font-style:normal;font-size:9px;opacity:.85">${zoneName}</em></span>
          <div class="vtk-stem"></div>
        </div>
        <div class="vtk-dot" style="left:${pct.toFixed(1)}%"></div>
        <div class="vtrack" style="background:${grad}">
          <div class="vtrack-tick" style="left:${p1}%"></div>
          <div class="vtrack-tick" style="left:${p2}%"></div>
        </div>
      </div>
      <div class="vzperow">
        <span class="vzpe" style="left:0%;transform:translateX(0%)">P/E ${pe15.toFixed(0)}x</span>
        <span class="vzpe" style="left:${p1}%">P/E ${pe30.toFixed(0)}x</span>
        <span class="vzpe" style="left:${p2}%">P/E ${pe50.toFixed(0)}x</span>
        <span class="vzpe" style="right:0%;left:auto;transform:translateX(0%)">P/E ${pe80.toFixed(0)}x</span>
      </div>
      <div class="vmeta">
        <div class="vm"><div class="vml">TTM EPS</div><div class="vmv">${ttmEPS.toFixed(2)}</div></div>
        <div class="vm"><div class="vml">本益比(P/E)</div><div class="vmv">${curPER > 0 ? curPER.toFixed(1)+'x' : '—'}</div></div>
        ${pbr > 0 ? `<div class="vm"><div class="vml">股價淨值比(P/B)</div><div class="vmv">${pbr.toFixed(2)}x</div></div>` : ''}
        ${divYield > 0 ? `<div class="vm"><div class="vml">殖利率</div><div class="vmv">${divYield.toFixed(2)}%</div></div>` : ''}
        ${pegHtml}${psHtml}
      </div>
    </div>`;
}

// ── Drag resize divider ───────────────────────────
(function() {
  const drag = document.getElementById('fund-drag');
  const fund = document.getElementById('fund');
  let active = false, startY = 0, startH = 0;

  function onStart(y) {
    active = true; startY = y; startH = fund.offsetHeight;
    drag.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  }
  function onMove(y) {
    if (!active) return;
    const dy = startY - y;   // drag up → fund grows
    const newH = Math.max(140, Math.min(620, startH + dy));
    fund.style.height = newH + 'px';
    fund.classList.remove('expanded');
    if (chart) {
      const box = document.getElementById('cbox');
      chart.applyOptions({ width: box.clientWidth, height: box.clientHeight });
    }
  }
  function onEnd() {
    active = false;
    drag.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  drag.addEventListener('mousedown',  e => { onStart(e.clientY); e.preventDefault(); });
  document.addEventListener('mousemove', e => onMove(e.clientY));
  document.addEventListener('mouseup',   onEnd);

  drag.addEventListener('touchstart',  e => { onStart(e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  document.addEventListener('touchmove', e => { if(active) { onMove(e.touches[0].clientY); e.preventDefault(); } }, {passive:false});
  document.addEventListener('touchend',  onEnd);
})();

init();
</script>
</body>
</html>
